 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CipherX</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<canvas id="matrix"></canvas>

<h1>🔐 CipherX Cyber Security System</h1>
<p id="typing"></p>

<div class="box">

<h2>Register</h2>
<input id="regUser" placeholder="Username">
<input id="regPass" type="password" placeholder="Password">
<br>
<button onclick="register()">Register</button>

<h2>Login</h2>
<input id="logUser" placeholder="Username">
<input id="logPass" type="password" placeholder="Password">
<br>
<button onclick="login()">Login</button>
<button onclick="getProfile()">Profile</button>
<button onclick="logout()">Logout</button>

<p id="result"></p>

</div>

<script>

let token = "";

// typing effect
const text = "Secure Authentication System...";
let i = 0;
function typingEffect() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typingEffect, 50);
    }
}
typingEffect();

// register
async function register() {
    const username = document.getElementById("regUser").value;
    const password = document.getElementById("regPass").value;

    const res = await fetch("http://localhost:3000/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    });

    const data = await res.text();
    document.getElementById("result").innerText = data;
}

// login
async function login() {
    const username = document.getElementById("logUser").value;
    const password = document.getElementById("logPass").value;

    const res = await fetch("http://localhost:3000/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (data.token) {
        token = data.token;
        document.getElementById("result").innerText =
        "Welcome " + username + " 🔥";
    } else {
        document.getElementById("result").innerText = data.message;
    }
}

// profile
async function getProfile() {
    const res = await fetch("http://localhost:3000/profile", {
        method: "GET",
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    const data = await res.json();

    if (data.username) {
        document.getElementById("result").innerText =
        "User: " + data.username + " 🟢";
    } else {
        document.getElementById("result").innerText = "Access Denied ❌";
    }
}

// logout
function logout() {
    token = "";
    document.getElementById("result").innerText = "Logged out 👋";
}

// MATRIX EFFECT
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function draw() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ff00";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        const text = letters.charAt(Math.floor(Math.random() * letters.length));
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
        }

        drops[i]++;
    }
}

setInterval(draw, 33);

</script>

</body>
</html>
